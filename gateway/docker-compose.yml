services:
  keydb:
    image: eqalpha/keydb:latest
    ports:
      - "6379:6379"
      
  postgres:
    image: postgres:14
    environment:
      POSTGRES_DB: lab
      POSTGRES_USER: lab
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lab -d lab"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build: .
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      KEYDB_ADDR: keydb:6379
      DB_DSN: postgres://lab:secret@postgres:5432/lab?sslmode=disable
      CONFIG_PATH: /app/config.yaml
    depends_on:
      - keydb
      - postgres
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/v1/health/health"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  pgdata:
